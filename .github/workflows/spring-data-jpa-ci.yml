name: Spring Data JPA School Application CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spring-data-jpa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Validate project and CI scripts
        run: |
          bash -n run.sh
          bash -n .github/scripts/verify_spring_boot_jar.sh
          bash -n .github/scripts/verify_docker_demo.sh
          python3 -m py_compile \
            .github/scripts/publish_test_summary.py

      - name: Check Docker availability
        run: docker version

      - name: Run Maven tests
        run: |
          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean test

      - name: Publish test summary
        if: always()
        run: |
          python3 .github/scripts/publish_test_summary.py \
            --title "Spring Data JPA application test results"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spring-data-jpa-test-reports
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Build Spring Boot JAR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Package application
        run: |
          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean package \
            -DskipTests

      - name: Verify Spring Boot JAR
        id: jar
        run: bash .github/scripts/verify_spring_boot_jar.sh

      - name: Upload Spring Boot JAR
        uses: actions/upload-artifact@v7
        with:
          name: spring-boot-jar
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Build Docker image
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      IMAGE_TAG: ${{ github.event.repository.name }}:ci-${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download Spring Boot JAR
        uses: actions/download-artifact@v8
        with:
          name: spring-boot-jar
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image and demo
        run: |
          bash .github/scripts/verify_docker_demo.sh \
            "$IMAGE_TAG"
