name: Publish Docker image

run-name: Prepare release ${{ inputs.version || 'validation' }}

on:
  pull_request:
    branches:
      - main
    paths:
      - pom.xml
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - compose.demo.yaml
      - .github/workflows/publish-docker.yml
      - .github/scripts/prepare_release_tag.sh
      - .github/scripts/verify_release_source.sh
      - .github/scripts/verify_spring_boot_jar.sh
      - .github/scripts/verify_docker_demo.sh
      - .github/scripts/publish_docker_image.sh

  workflow_dispatch:
    inputs:
      version:
        description: Release version in MAJOR.MINOR.PATCH format
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release configuration
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release scripts
        run: |
          bash -n .github/scripts/prepare_release_tag.sh
          bash -n .github/scripts/verify_release_source.sh
          bash -n .github/scripts/verify_spring_boot_jar.sh
          bash -n .github/scripts/verify_docker_demo.sh
          bash -n .github/scripts/publish_docker_image.sh

      - name: Validate release configuration
        env:
          REQUESTED_VERSION: ""
        run: bash .github/scripts/prepare_release_tag.sh

  prepare-release:
    name: Prepare release tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    outputs:
      release_version: ${{ steps.release.outputs.release_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      tag_action: ${{ steps.release.outputs.tag_action }}
      tag_created: ${{ steps.release.outputs.tag_created }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release scripts
        run: |
          bash -n .github/scripts/prepare_release_tag.sh
          bash -n .github/scripts/verify_release_source.sh
          bash -n .github/scripts/verify_spring_boot_jar.sh
          bash -n .github/scripts/verify_docker_demo.sh
          bash -n .github/scripts/publish_docker_image.sh

      - name: Validate release and prepare tag
        id: release
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: bash .github/scripts/prepare_release_tag.sh

  publish-image:
    name: Publish Docker image
    needs: prepare-release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    environment:
      name: docker-hub

    env:
      RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
      RELEASE_SHA: ${{ needs.prepare-release.outputs.release_sha }}
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release source
        run: |
          bash .github/scripts/verify_release_source.sh \
            "$RELEASE_TAG" \
            "$RELEASE_VERSION" \
            "$RELEASE_SHA"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Package application
        run: |
          ./mvnw \
            --batch-mode \
            --no-transfer-progress \
            clean package \
            -DskipTests

      - name: Verify Spring Boot JAR
        run: bash .github/scripts/verify_spring_boot_jar.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.RELEASE_VERSION }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.RELEASE_SHA }}
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image and demo
        run: |
          bash .github/scripts/verify_docker_demo.sh \
            "$IMAGE_NAME:$RELEASE_VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker image
        run: |
          bash .github/scripts/publish_docker_image.sh \
            "$IMAGE_NAME" \
            "$RELEASE_VERSION" \
            "$RELEASE_SHA"
